# ============================================================================
# Rate limit zones (must be in http context — defined in main nginx.conf)
# Defined in selfhosted-resources/nginx-reverseproxy/* for the reverse proxy.
# Inside this container we still apply per-server limits below.
# ============================================================================

# Limit connections per IP
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
# Strict zone for /auth/* — anti brute-force (5 req/s avg with burst)
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/s;
# General API zone
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # =========================================================================
    # Connection / request limits
    # =========================================================================
    limit_conn conn_per_ip 50;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # =========================================================================
    # Security headers
    # =========================================================================
    # Clickjacking protection
    add_header X-Frame-Options "SAMEORIGIN" always;
    # MIME-type sniffing protection
    add_header X-Content-Type-Options "nosniff" always;
    # Legacy XSS protection (still useful for older clients)
    add_header X-XSS-Protection "1; mode=block" always;
    # Referrer policy — prevents sensitive data leakage via Referer header
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissions-Policy — disables unused browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # HSTS — only when served over HTTPS via reverse proxy.
    # 1 year, includeSubDomains, preload-ready. Safe because TLS is terminated upstream.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy
    # - default-src 'self'
    # - 'unsafe-inline' for styles (Tailwind/shadcn injects inline styles)
    # - 'unsafe-eval' for PDF.js (uses eval internally)
    # - connect-src allows Supabase API (https + wss for realtime)
    # - frame-ancestors 'none' — blocks iframing (defense in depth + X-Frame-Options)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.supabase.in wss://*.supabase.in https://xgtwutpbojltmktprdui.supabase.co wss://xgtwutpbojltmktprdui.supabase.co; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;

    # Hide nginx version
    server_tokens off;

    # Include default MIME types + add .mjs support for PDF.js worker
    include /etc/nginx/mime.types;
    types {
        application/javascript mjs;
    }

    # =========================================================================
    # Cache static assets (long-lived, immutable)
    # =========================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mjs)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-emit security headers for asset responses
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # =========================================================================
    # Block sensitive files / dotfiles
    # =========================================================================
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    # =========================================================================
    # SPA fallback - all routes to index.html
    # =========================================================================
    location / {
        # Apply per-IP rate limit on dynamic requests (burst tolerates spikes)
        limit_req zone=api_zone burst=60 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # =========================================================================
    # Health check endpoint (no rate limit, no log)
    # =========================================================================
    location /health {
        access_log off;
        limit_req off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
